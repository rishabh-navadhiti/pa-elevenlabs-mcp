services:
  mcp-server:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http mcp-server:8000
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - mcp-server
    restart: unless-stopped
